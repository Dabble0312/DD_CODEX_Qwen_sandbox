<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="DojiDash Focus Mode — deep-dive candle analysis with pattern detection and NLP summaries.">
    <title>DojiDash — Focus Mode</title>
    <link rel="icon" href="assets/images/Logo.gif" type="image/gif">
    <link rel="stylesheet" href="tokens.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="focus.css">
</head>

<body>

    <div id="usernameDisplay" class="username-display"></div>
    <div id="focusHUD" class="focus-hud">Loading...</div>
    <div id="focusStatus" class="focus-status"></div>

    <!-- Chart — full width -->
    <div class="chart-wrapper" id="chart-container">
        <div id="chart"></div>
        <div id="glowOverlay" class="glow-overlay"></div>
        <canvas id="overlay-canvas"></canvas>
        <div id="draw-controls">
            <button id="draw-line-btn" title="Drawing tools">✏️</button>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════
         BELOW-CHART LAYOUT  — two columns
         Left : controls + candle context
         Right: right panel (pattern explain / chat)
    ════════════════════════════════════════════════════ -->
    <div class="below-chart">

        <!-- ── LEFT COLUMN ── -->
        <div class="left-col">

            <!-- Reveal count -->
            <div class="reveal-count-row">
                <label for="revealCount">Candles to reveal:</label>
                <select id="revealCount" class="reveal-count-select">
                    <option value="1">1 day</option>
                    <option value="2">2 days</option>
                    <option value="3">3 days</option>
                    <option value="4" selected>4 days</option>
                    <option value="5">5 days</option>
                    <option value="6">6 days</option>
                    <option value="7">7 days</option>
                </select>
            </div>

            <!-- Candle context header + stats pills -->
            <div class="stats-panel-header">
                <span class="stats-label">Candle context</span>
                <button id="summaryToggleBtn" class="summary-toggle-btn">
                    &#9432; Explain this candle
                </button>
            </div>
            <div class="stats-panel">
                <div class="stat-pill">Trend: <span id="statTrend">—</span></div>
                <div class="stat-pill">Momentum: <span id="statMomentum">—</span></div>
                <div class="stat-pill">Volatility: <span id="statVolatility">—</span></div>
                <div class="stat-pill">RSI: <span id="statRSI">—</span></div>
                <div class="stat-pill">ATR: <span id="statATR">—</span></div>
                <div class="stat-pill">Volume: <span id="statVolume">—</span></div>
                <div class="stat-pill">Candle: <span id="statStrength">—</span></div>
            </div>

            <!-- Summary panel (candle explanation) — inline in left col -->
            <div id="summaryPanel" class="hidden">
                <span id="summaryText"></span>
            </div>

            <!-- Button row -->
            <div class="button-row">
                <button id="revealBtn" class="reveal-btn">REVEAL</button>
                <span class="price-target-label">Target:</span>
                <input id="priceTarget" type="number" step="0.01" placeholder="e.g. 372.50" class="price-target-input">
                <button id="togglePatternsBtn" class="btn-patterns">Patterns</button>
                <button id="togglePatternExplainBtn" class="btn-explain-patterns">Explain</button>
                <!-- Narrator: icon only, tooltip on hover -->
                <button id="narratorBtn" class="btn-narrator" title="Narrate chart">
                    <span id="narratorIcon">🔊</span>
                </button>
                <!-- Chat: icon only, tooltip on hover -->
                <button id="chatToggleBtn" class="btn-chat" title="Open cognition chat">💬</button>
            </div>

            <!-- Pattern tags panel -->
            <div id="patternPanel" class="hidden"></div>

            <!-- Candle info -->
            <div id="candleInfo"><span class="candle-info-empty">Click any candle to inspect</span></div>

            <!-- Price feedback -->
            <div id="priceFeedback"></div>

        </div><!-- /left-col -->

        <!-- ── RIGHT PANEL ── -->
        <div class="right-panel" id="rightPanel">

            <!-- Default state: placeholder shown when nothing is active -->
            <div class="right-panel-placeholder" id="rightPanelPlaceholder">
                <span>Click <strong>Explain</strong> or <strong>💬</strong> to open here</span>
            </div>

            <!-- Pattern explanation — shown inside right panel -->
            <div id="patternExplainPanel" class="right-panel-section hidden">
                <div class="right-panel-section-header">
                    <span class="right-panel-section-title">Pattern Explanation</span>
                    <button class="right-panel-close" data-closes="patternExplainPanel">✕</button>
                </div>
                <div class="right-panel-section-body" id="patternExplainBody"></div>
            </div>

            <!-- Chat panel — shown inside right panel -->
            <div id="chatPanel" class="right-panel-section hidden">
                <div class="chat-header right-panel-section-header">
                    <span class="chat-header-title">📊 DojiDash Chat</span>
                    <span class="chat-header-sub">No predictions</span>
                    <button class="right-panel-close" data-closes="chatPanel">✕</button>
                </div>
                <div id="chatFeed" class="chat-feed"></div>
                <div class="chat-chips">
                    <button class="chat-chip" data-cmd="/explain last candle">Last candle</button>
                    <button class="chat-chip" data-cmd="/explain last 5">Last 5</button>
                    <button class="chat-chip" data-cmd="/explain patterns">Patterns</button>
                    <button class="chat-chip" data-cmd="/explain market">Market</button>
                    <button class="chat-chip" data-cmd="/explain breakout">Breakout</button>
                    <button class="chat-chip" data-cmd="/explain failed breakout">Failed BO</button>
                </div>
                <div class="chat-input-row">
                    <input id="chatInput" class="chat-input" type="text"
                        placeholder="e.g. /explain last candle …" autocomplete="off" />
                    <button id="chatSendBtn" class="chat-send-btn">Send</button>
                </div>
            </div>

        </div><!-- /right-panel -->

    </div><!-- /below-chart -->

    <!-- Popups -->
    <div id="resultPopup" class="popup hidden">
        <span id="popupResultText"></span>
    </div>
    <div id="wsbPopup" class="wsb-popup">
        <img id="mascotEmoji" class="wsb-emoji">
        <span id="wsbText" class="wsb-text"></span>
    </div>

    <!-- End screen -->
    <div id="endScreen" class="end-screen hidden">
        <div class="end-content">
            <h2>Session Over</h2>
            <p id="resultText"></p>
            <button id="playAgainBtn">Play Again</button>
            <button id="homeBtn">Home</button>
            <button id="reportBtn">Generate Session Report</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="shared/chart.js"></script>
    <script src="shared/ui.js"></script>
    <script src="focus-summary.js"></script>
    <script src="focus-patterns.js"></script>
    <script src="focus-narate.js"></script>
    <script src="focus-ui.js"></script>
    <script src="focus-chat.js"></script>
    <script src="focus-draw.js"></script>
    <script src="focus-core.js"></script>
</body>

</html>
